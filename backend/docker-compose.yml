version: '3.8'
services:
  app:
    image: php:8.3-fpm
    container_name: rentora_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - rentora_network
    depends_on:
      - mysql
      - redis

  webserver:
    image: nginx:alpine
    container_name: rentora_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - rentora_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: rentora_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rentora
      MYSQL_USER: rentora_user
      MYSQL_PASSWORD: rentora_secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - rentora_mysql_data:/var/lib/mysql
    networks:
      - rentora_network

  redis:
    image: redis:alpine
    container_name: rentora_redis
    restart: unless-stopped
    volumes:
      - rentora_redis_data:/data
    networks:
      - rentora_network

networks:
  rentora_network:
    driver: bridge

volumes:
  rentora_mysql_data:
  rentora_redis_data:
